<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Efemérides Futboleras | El Deporte Rey</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <h1>⚽ Efemérides <span class="highlight">Futbol</span></h1>
      </div>
      <nav>
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="deldia.html">Del Día</a></li>
          <li><a href="calendario.html">Calendario</a></li>
          <li><a href="lamasvisto.html">Lo más visto</a></li>
          <li><a href="contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h2>Bienvenidos al rincón de la historia</h2>
        <p>
          Revive los momentos que marcaron el fútbol mundial hoy, ayer y
          siempre.
        </p>
      </section>

      <section id="contacto">
    <h2>Contáctanos</h2>
    <form action="/api/contacto" method="POST">
        <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
        </div>
        
        <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" rows="4" required></textarea>
        </div>
        
        <button type="submit">Enviar Mensaje</button>
    </form>
</section>

    <footer>
      <p>&copy; 2026 Efemérides Futboleras - Proyecto Agile Scrum</p>
      <div class="socials">
        <p>Hecho con pasión por el fútbol</p>
      </div>
    </footer>
  </body>
</html>
